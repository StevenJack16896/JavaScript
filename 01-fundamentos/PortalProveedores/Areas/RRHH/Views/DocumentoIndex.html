@{
    ViewBag.Title = "Documento";
}
@{ Layout = "~/Views/Shared/_Layout.cshtml"; }

@section scripts { <script type="text/javascript" src="~/Areas/RRHH/Scripts/jsDocumento.js?v=1.54"></script> }

<div class="card">
    <div class="card-body">
        <ul class="nav nav-pills nav-customs nav-danger mb-3" role="tablist">

            <li class="nav-item" id="li-tab-register">
                <a class="nav-link" data-bs-toggle="tab" href="#tab-register" role="tab" disabled>Registro</a>
            </li>
            <li class="nav-item" id="li-tab-search">
                <a class="nav-link active" data-bs-toggle="tab" href="#tab-search" role="tab">Busqueda</a>
            </li>
        </ul>
        <div class="tab-content text-muted">
            <div class="tab-pane" id="tab-register" role="tabpanel">
                @Html.Partial("FrmDocumentoRegistrar")
            </div>
            <div class="tab-pane active" id="tab-search" role="tabpanel">
                @Html.Partial("FrmDocumentoBuscar")
            </div>
        </div>
    </div>
</div>
